<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoetze — Beheerpaneel</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Admin specific styles overriding/extending main styles */
        .admin-body {
            background-color: var(--color-cream);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .admin-login-card {
            background: var(--color-white);
            padding: 40px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .admin-logo {
            font-family: var(--font-brand);
            font-size: 3.5rem;
            color: var(--color-rose-dark);
            margin-bottom: 8px;
        }

        .admin-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            color: var(--color-chocolate);
            margin-bottom: 24px;
        }

        .admin-input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .admin-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-chocolate-light);
            margin-bottom: 8px;
        }

        .admin-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--color-blush);
            border-radius: var(--radius-sm);
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--color-chocolate);
            background-color: var(--color-cream);
            transition: var(--transition-fast);
        }

        .admin-input:focus {
            border-color: var(--color-rose);
            outline: none;
            background-color: var(--color-white);
        }

        .admin-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            background-color: var(--color-rose-dark);
            color: var(--color-white);
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .admin-btn:hover {
            background-color: #be657e;
        }

        .admin-btn:disabled {
            background-color: var(--color-rose);
            cursor: not-allowed;
        }

        .admin-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 12px;
            font-weight: 500;
            display: none;
        }

        /* Dashboard specific layout */
        .dashboard-container {
            display: none;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: var(--color-white);
            padding: 40px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--color-cream);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .dashboard-title-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .dashboard-title {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            color: var(--color-chocolate);
        }

        .logout-btn {
            background-color: var(--color-cream);
            color: var(--color-chocolate);
            border: 1px solid var(--color-rose);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .logout-btn:hover {
            background-color: var(--color-blush);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 992px) {
            .dashboard-grid {
                grid-template-columns: 350px 1fr;
            }
        }

        .control-panel {
            background-color: var(--color-cream);
            padding: 24px;
            border-radius: var(--radius-sm);
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: fit-content;
        }

        .selected-date-title {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: var(--color-chocolate);
            margin-bottom: 10px;
        }

        .status-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .status-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border: 2px solid var(--color-white);
            border-radius: var(--radius-sm);
            background-color: var(--color-white);
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 500;
            transition: var(--transition-fast);
            text-align: left;
        }

        .status-btn:hover {
            border-color: var(--color-rose);
        }

        .status-btn.active {
            border-color: var(--color-rose-dark);
            box-shadow: 0 0 10px rgba(209, 123, 148, 0.2);
        }

        .dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-green { background-color: #4ade80; }
        .dot-orange { background-color: #fbbf24; }
        .dot-red { background-color: #f87171; }

        .calendar-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .admin-calendar-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .admin-calendar-day {
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .admin-calendar-day:hover {
            transform: scale(1.1);
            filter: brightness(0.95);
        }

        .admin-calendar-day.selected {
            outline: 3px solid var(--color-rose-dark);
            outline-offset: 1px;
            z-index: 10;
        }

        .save-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--color-white);
            border: 1px solid var(--color-blush);
            padding: 20px;
            border-radius: var(--radius-sm);
            margin-top: 30px;
            box-shadow: var(--shadow-sm);
        }

        .save-status-text {
            font-weight: 500;
            color: var(--color-chocolate-light);
        }

        .save-status-text.success {
            color: #10b981;
        }

        .save-status-text.error {
            color: #ef4444;
        }
    </style>
</head>
<body class="admin-body">

    <!-- LOGIN SCREEN -->
    <div id="login-container" class="admin-login-card">
        <div class="admin-logo">Zoetze</div>
        <div class="admin-title">Beheerpaneel</div>
        
        <div class="admin-input-group">
            <label class="admin-label" for="password">Toegangscode (Wachtwoord)</label>
            <input type="password" id="password" class="admin-input" placeholder="Voer wachtwoord in...">
        </div>

        <button id="login-btn" class="admin-btn">Aanmelden</button>
        <div id="login-error" class="admin-error">Onjuiste toegangscode. Probeer opnieuw.</div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-container" class="dashboard-container">
        <div class="dashboard-header">
            <div class="dashboard-title-wrapper">
                <span style="font-family: var(--font-brand); font-size: 2.5rem; color: var(--color-rose-dark);">Zoetze</span>
                <h1 class="dashboard-title">Beheerpaneel</h1>
            </div>
            <button id="logout-btn" class="logout-btn">Uitloggen</button>
        </div>

        <div class="dashboard-grid">
            <!-- Left panel: Controls -->
            <div class="control-panel">
                <div>
                    <h3 class="selected-date-title">Aankondiging (Waarschuwing)</h3>
                    <textarea id="warning-message" class="admin-input" rows="3" style="resize: none;" placeholder="Tekst boven de kalender..."></textarea>
                </div>

                <div style="border-top: 1px solid var(--color-rose); padding-top: 20px;">
                    <h3 class="selected-date-title">Datum instellen</h3>
                    <div id="selected-date-label" style="font-weight: 600; font-size: 0.95rem; color: var(--color-chocolate); margin-bottom: 12px;">
                        Klik op een dag in de kalender
                    </div>
                    <div class="status-options">
                        <button class="status-btn" data-status="vrij" id="btn-vrij" disabled>
                            <span class="dot dot-green"></span> Vrij (Groen)
                        </button>
                        <button class="status-btn" data-status="laatste plekje" id="btn-laatste" disabled>
                            <span class="dot dot-orange"></span> Laatste plekje (Oranje)
                        </button>
                        <button class="status-btn" data-status="volzet" id="btn-volzet" disabled>
                            <span class="dot dot-red"></span> Volzet (Rood)
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right panel: Interactive Calendar Grid -->
            <div class="calendar-section">
                <h2 style="font-family: var(--font-heading); font-size: 1.4rem; color: var(--color-chocolate); text-align: center;">Klik op een dag om de status te wijzigen</h2>
                <div class="admin-calendar-grid" id="admin-calendar-grid">
                    <!-- Dynamic calendar months will load here -->
                </div>
            </div>
        </div>

        <!-- Bottom Banner: Save controls -->
        <div class="save-banner">
            <div id="save-status" class="save-status-text">Wijzigingen niet opgeslagen</div>
            <button id="save-btn" class="admin-btn" style="width: auto; padding: 12px 30px;">Wijzigingen opslaan</button>
        </div>
    </div>

    <script>
        // AES-GCM Encrypted Token parameters generated via Node.js
        const ENCRYPTED_PAYLOAD = {
            salt: "d0ef9f10db851ff129dc2c7b35c84745",
            iv: "5d2ab52c727eb4fb408f8f6a",
            encrypted: "6c2f5046369cd36718128f779285d7ef17ea137090187bb903cc907760778f41291f15acbb538e8f",
            tag: "4f31c5856b8189ec86870600d4731bf9"
        };

        // GitHub Repository Config
        const GITHUB_REPO = "Billy33722/Zoetze";
        const DATA_FILE_PATH = "availability.json";

        // Global State
        let decryptedToken = "";
        let availabilityData = { message: "", availability: {} };
        let selectedDateKey = null;
        let selectedDayElement = null;

        // Elements
        const loginContainer = document.getElementById('login-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');
        const logoutBtn = document.getElementById('logout-btn');
        const warningMessageInput = document.getElementById('warning-message');
        const selectedDateLabel = document.getElementById('selected-date-label');
        const adminCalendarGrid = document.getElementById('admin-calendar-grid');
        const saveBtn = document.getElementById('save-btn');
        const saveStatus = document.getElementById('save-status');

        const statusBtns = {
            vrij: document.getElementById('btn-vrij'),
            laatste: document.getElementById('btn-laatste'),
            volzet: document.getElementById('btn-volzet')
        };

        // 1. Web Crypto Decryption Helper
        async function decryptToken(password, encryptedData) {
            const salt = new Uint8Array(encryptedData.salt.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            const iv = new Uint8Array(encryptedData.iv.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            const ciphertext = new Uint8Array(encryptedData.encrypted.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            const tag = new Uint8Array(encryptedData.tag.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));

            const combined = new Uint8Array(ciphertext.length + tag.length);
            combined.set(ciphertext);
            combined.set(tag, ciphertext.length);

            const enc = new TextEncoder();
            const keyMaterial = await window.crypto.subtle.importKey(
                "raw",
                enc.encode(password),
                "PBKDF2",
                false,
                ["deriveKey"]
            );

            const key = await window.crypto.subtle.deriveKey(
                {
                    name: "PBKDF2",
                    salt: salt,
                    iterations: 100000,
                    hash: "SHA-256"
                },
                keyMaterial,
                { name: "AES-GCM", length: 256 },
                false,
                ["decrypt"]
            );

            try {
                const decrypted = await window.crypto.subtle.decrypt(
                    {
                        name: "AES-GCM",
                        iv: iv,
                        tagLength: 128
                    },
                    key,
                    combined
                );

                const dec = new TextDecoder();
                return dec.decode(decrypted);
            } catch (e) {
                throw new Error("Invalid password");
            }
        }

        // 2. Pad zero helper for dates
        function padZero(num) {
            return num.toString().padStart(2, '0');
        }

        // 3. UI flow toggles
        function showDashboard() {
            loginContainer.style.display = 'none';
            dashboardContainer.style.display = 'block';
            document.body.style.alignItems = 'stretch';
        }

        function showLogin() {
            loginContainer.style.display = 'block';
            dashboardContainer.style.display = 'none';
            document.body.style.alignItems = 'center';
            passwordInput.value = "";
        }

        // 4. Fetch availability database from GitHub (public fetch)
        async function loadAvailabilityData() {
            try {
                // Fetch with a cache-buster query param to get fresh data
                const response = await fetch(`${DATA_FILE_PATH}?t=${Date.now()}`);
                if (response.ok) {
                    availabilityData = await response.json();
                } else {
                    console.warn("Could not load availability.json, initializing empty template.");
                    availabilityData = { message: "", availability: {} };
                }
                warningMessageInput.value = availabilityData.message || "";
                renderCalendars();
            } catch (e) {
                console.error("Error fetching database file:", e);
                renderCalendars();
            }
        }

        // 5. Render calendars
        function renderCalendars() {
            const dutchMonths = [
                'Januari', 'Februari', 'Maart', 'April', 'Mei', 'Juni',
                'Juli', 'Augustus', 'September', 'Oktober', 'November', 'December'
            ];

            const now = new Date();
            let currentYear = now.getFullYear();
            let currentMonth = now.getMonth();
            let html = "";

            // Render 5 months
            for (let i = 0; i < 5; i++) {
                let m = (currentMonth + i) % 12;
                let y = currentYear + Math.floor((currentMonth + i) / 12);

                const daysInMonth = new Date(y, m + 1, 0).getDate();
                const startDay = new Date(y, m, 1).getDay();
                const offset = startDay === 0 ? 6 : startDay - 1;

                html += `<div class="calendar-month" style="background: white; padding: 20px; border-radius: 8px; box-shadow: var(--shadow-sm); width: 300px; border: 1px solid var(--color-blush);">
                    <h3 style="text-align: center; margin-bottom: 16px; font-size: 1rem; color: #333; font-weight: 500; font-family: var(--font-body);">${dutchMonths[m]} ${y}</h3>
                    <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.85rem;">
                        <span style="font-weight:bold;color:#666;">Ma</span>
                        <span style="font-weight:bold;color:#666;">Di</span>
                        <span style="font-weight:bold;color:#666;">Wo</span>
                        <span style="font-weight:bold;color:#666;">Do</span>
                        <span style="font-weight:bold;color:#666;">Vr</span>
                        <span style="font-weight:bold;color:#666;">Za</span>
                        <span style="font-weight:bold;color:#666;">Zo</span>`;

                for (let o = 0; o < offset; o++) {
                    html += `<span></span>`;
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateKey = `${y}-${padZero(m + 1)}-${padZero(d)}`;
                    const status = availabilityData.availability[dateKey] || 'vrij';

                    let bg = '#4ade80';
                    if (status === 'volzet') {
                        bg = '#f87171';
                    } else if (status === 'laatste plekje' || status === 'oranje') {
                        bg = '#fbbf24';
                    }

                    html += `<span class="admin-calendar-day" data-date="${dateKey}" style="background:${bg};color:white;padding:4px 0;border-radius:2px;font-family:var(--font-body);">${d}</span>`;
                }

                html += `</div></div>`;
            }

            adminCalendarGrid.innerHTML = html;

            // Re-attach listeners to day cells
            document.querySelectorAll('.admin-calendar-day').forEach(el => {
                el.addEventListener('click', () => selectDay(el));
            });

            // Keep selection state if rerendered
            if (selectedDateKey) {
                const activeEl = document.querySelector(`.admin-calendar-day[data-date="${selectedDateKey}"]`);
                if (activeEl) {
                    activeEl.classList.add('selected');
                    selectedDayElement = activeEl;
                }
            }
        }

        // 6. Day cell click handling
        function selectDay(element) {
            if (selectedDayElement) {
                selectedDayElement.classList.remove('selected');
            }
            selectedDayElement = element;
            selectedDayElement.classList.add('selected');
            selectedDateKey = element.dataset.date;

            // Formatted label
            const parts = selectedDateKey.split('-');
            selectedDateLabel.textContent = `Geselecteerd: ${parts[2]}-${parts[1]}-${parts[0]}`;

            // Enable buttons
            Object.values(statusBtns).forEach(btn => btn.disabled = false);

            // Highlight current status button
            const currentStatus = availabilityData.availability[selectedDateKey] || 'vrij';
            updateActiveStatusButton(currentStatus);
        }

        function updateActiveStatusButton(status) {
            Object.values(statusBtns).forEach(btn => btn.classList.remove('active'));
            if (status === 'vrij') {
                statusBtns.vrij.classList.add('active');
            } else if (status === 'laatste plekje' || status === 'oranje') {
                statusBtns.laatste.classList.add('active');
            } else if (status === 'volzet') {
                statusBtns.volzet.classList.add('active');
            }
        }

        // 7. Status change handling
        function changeStatus(status) {
            if (!selectedDateKey) return;

            // Update local state
            if (status === 'vrij') {
                delete availabilityData.availability[selectedDateKey];
            } else {
                availabilityData.availability[selectedDateKey] = status;
            }

            // Update day cell color in real time
            let bg = '#4ade80';
            if (status === 'volzet') bg = '#f87171';
            else if (status === 'laatste plekje') bg = '#fbbf24';

            if (selectedDayElement) {
                selectedDayElement.style.background = bg;
            }

            updateActiveStatusButton(status);
            setModifiedStatus();
        }

        function setModifiedStatus() {
            saveStatus.textContent = "⚠️ Wijzigingen niet opgeslagen";
            saveStatus.className = "save-status-text";
        }

        // 8. Event listeners
        loginBtn.addEventListener('click', async () => {
            const pw = passwordInput.value.trim();
            if (!pw) return;

            loginBtn.disabled = true;
            loginError.style.display = 'none';

            try {
                decryptedToken = await decryptToken(pw, ENCRYPTED_PAYLOAD);
                // Valid password! Store in localStorage
                localStorage.setItem('zoetze_admin_pw', pw);
                showDashboard();
                await loadAvailabilityData();
            } catch (e) {
                loginError.style.display = 'block';
                loginBtn.disabled = false;
            }
        });

        // Allow entering key on pressing Enter
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('zoetze_admin_pw');
            decryptedToken = "";
            showLogin();
        });

        statusBtns.vrij.addEventListener('click', () => changeStatus('vrij'));
        statusBtns.laatste.addEventListener('click', () => changeStatus('laatste plekje'));
        statusBtns.volzet.addEventListener('click', () => changeStatus('volzet'));

        warningMessageInput.addEventListener('input', () => {
            availabilityData.message = warningMessageInput.value;
            setModifiedStatus();
        });

        // 9. Commit changes to GitHub repository via GitHub API
        saveBtn.addEventListener('click', async () => {
            saveBtn.disabled = true;
            saveStatus.textContent = "⏳ Bezig met opslaan...";
            saveStatus.className = "save-status-text";

            try {
                // Fetch the current file SHA from GitHub API first
                const fetchUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_FILE_PATH}`;
                const fetchResponse = await fetch(fetchUrl, {
                    headers: {
                        "Authorization": `token ${decryptedToken}`,
                        "Accept": "application/vnd.github.v3+json"
                    }
                });

                if (!fetchResponse.ok) {
                    throw new Error(`Failed to load file information from GitHub. Status: ${fetchResponse.status}`);
                }

                const fileInfo = await fetchResponse.json();
                const fileSha = fileInfo.sha;

                // Push update with SHA
                const putResponse = await fetch(fetchUrl, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${decryptedToken}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Update availability calendar via admin panel",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(availabilityData, null, 2)))),
                        sha: fileSha
                    })
                });

                if (putResponse.ok) {
                    saveStatus.textContent = "✅ Wijzigingen succesvol opgeslagen!";
                    saveStatus.className = "save-status-text success";
                } else {
                    throw new Error(`Failed to write database file. Status: ${putResponse.status}`);
                }

            } catch (e) {
                console.error("Save error:", e);
                saveStatus.textContent = "❌ Fout bij opslaan. Controleer verbinding en probeer opnieuw.";
                saveStatus.className = "save-status-text error";
            } finally {
                saveBtn.disabled = false;
            }
        });

        // 10. Auto login if password stored in localStorage
        window.addEventListener('load', async () => {
            const storedPw = localStorage.getItem('zoetze_admin_pw');
            if (storedPw) {
                try {
                    decryptedToken = await decryptToken(storedPw, ENCRYPTED_PAYLOAD);
                    showDashboard();
                    await loadAvailabilityData();
                } catch (e) {
                    // Stored password is no longer valid, clear it
                    localStorage.removeItem('zoetze_admin_pw');
                    showLogin();
                }
            } else {
                showLogin();
            }
        });
    </script>
</body>
</html>
